# =====================================================
# Generic WordPress Plugin Deploy Config
# =====================================================
#
# This config is designed for the generic deploy.sh script.
#
# Supports:
# - Root-layout plugin repos
# - Traditional plugin-folder repos
# - GitHub release deployment
# - Private zip deployment
# - UUPD updater metadata generation
# - Dry-run testing
# - Reusable package exclude rules
#
# =====================================================
# BASIC PLUGIN DETAILS
# =====================================================

# Human-readable plugin name.
PLUGIN_NAME=WP WAF Manager

# Comma-separated tags used if readme.txt generation is enabled.
PLUGIN_TAGS=cloudflare, waf, security, dns, analytics

# IMPORTANT:
# This becomes the top-level folder name inside the plugin zip.
#
# Keep this IDENTICAL to the installed plugin folder name,
# otherwise WordPress updates may install into a new folder.
PLUGIN_SLUG=wpwafmanager

# =====================================================
# SOURCE LAYOUT
# =====================================================

# SOURCE_MODE options:
#
# root   = plugin main file lives in repo root
# folder = plugin lives in PLUGIN_SLUG/ subfolder
#
# Example root layout:
#   repo/
#     plugin.php
#     includes/
#     assets/
#
# Example folder layout:
#   repo/
#     my-plugin/
#       my-plugin.php
#
SOURCE_MODE=root

# Main plugin bootstrap file.
#
# For SOURCE_MODE=root:
#   repo/wpwafmanager.php
#
# For SOURCE_MODE=folder:
#   repo/wpwafmanager/wpwafmanager.php
#
MAIN_PLUGIN_FILE=wpwafmanager.php

# =====================================================
# GITHUB / RELEASE SETTINGS
# =====================================================

# GitHub repo in user/repo format.
GITHUB_REPO=stingray82/wpwafmanager

# Branch used for releases and updater metadata.
#
# The deploy script:
# - requires checkout to this branch (optional)
# - commits generated updater files here
# - creates releases targeting this branch
#
RELEASE_BRANCH=release/wpwaf-manager-fork

# =====================================================
# UUPD SETTINGS
# =====================================================

# Folder where updater metadata is generated.
#
# This folder:
# - EXISTS in the repository
# - DOES NOT get included in the plugin zip
#
# Example:
#   uupd/index.json
#
UUPD_DIR=uupd

# =====================================================
# ZIP / PACKAGE SETTINGS
# =====================================================

# Final release zip filename uploaded to GitHub Releases.
#
# This becomes:
#   releases/latest/download/wp-waf-manager.zip
#
ZIP_NAME=wp-waf-manager.zip

# =====================================================
# SHARED HELPER SCRIPTS
# =====================================================

# Plugin header update/check script.
HEADER_SCRIPT=/c/Ignore By Avast/0. PATHED Items/Plugins/deployscripts/myplugin_headers.php

# UUPD index.json generator script.
GENERATOR_SCRIPT=/c/Ignore By Avast/0. PATHED Items/Plugins/deployscripts/generate_index.php

# GitHub token file.
TOKEN_FILE=/c/Ignore By Avast/0. PATHED Items/Plugins/deployscripts/github_token.txt

# =====================================================
# CHANGELOG / README INPUTS
# =====================================================

# Changelog file used for:
# - GitHub release body
# - UUPD changelog section
# - readme.txt generation
#
CHANGELOG_FILE=cl.txt

# Static readme content used ONLY if readme generation is enabled.
STATIC_FILE=static.txt

# =====================================================
# DEPLOY TARGET
# =====================================================

# Options:
#
# github = create/update GitHub Release
# private = copy zip to DEST_DIR instead
#
DEPLOY_TARGET=github

# =====================================================
# DRY RUN / SAFETY SETTINGS
# =====================================================

# DRY_RUN:
#
# 1 = build/test only
#     - builds zip
#     - generates updater metadata
#     - DOES NOT commit
#     - DOES NOT push
#     - DOES NOT create GitHub release
#
# 0 = live deployment
#
DRY_RUN=0

# Require current branch to match RELEASE_BRANCH.
#
# Prevents accidental deployment from wrong branch.
#
REQUIRE_RELEASE_BRANCH=1

# =====================================================
# README GENERATION
# =====================================================

# Skip readme.txt generation entirely.
#
# Recommended for:
# - direct forks
# - mirrored upstream plugins
#
# Set to 0 if you want deploy.sh to build readme.txt.
#
SKIP_README_GENERATION=1

# README metadata used ONLY if readme generation is enabled.
README_CONTRIBUTORS=reallyusefulplugins
README_DONATE_LINK=https://reallyusefulplugins.com/donate
README_LICENSE=GPL-2.0-or-later
README_LICENSE_URI=https://www.gnu.org/licenses/gpl-2.0.html

# =====================================================
# PACKAGE EXCLUDES
# =====================================================

# Space-separated list of files/folders excluded from plugin zip.
#
# Common examples:
# - .git
# - updater metadata folders
# - deployment scripts
# - changelog source files
# - IDE folders
#
PACKAGE_EXCLUDES=.git .github .idea .vscode build node_modules uupd deploy.sh deploy.cfg cl.txt static.txt *.bak *.zip merge.md

# =====================================================
# ZIP SAFETY CHECKS
# =====================================================

# Space-separated list of paths/files that MUST NOT appear in zip.
#
# The deploy script will FAIL if any are detected.
#
ZIP_FORBIDDEN_PATHS=uupd/ static.txt cl.txt merge.md

# =====================================================
# OPTIONAL SETTINGS
# =====================================================

# Require rsync for packaging.
#
# Recommended:
# - 1 for production
# - 0 for portability
#
REQUIRE_RSYNC=0

# Optional label shown in logs.
SCRIPT_LABEL=Plugin Deploy

# Optional custom 7-Zip path.
#
# SEVENZIP_PATH=/c/Program Files/7-Zip/7z.exe

# =====================================================
# PRIVATE DEPLOY SETTINGS
# =====================================================

# Used ONLY if:
#   DEPLOY_TARGET=private
#
#DEST_DIR=D:/updater.reallyusefulplugins.com/plugin-updates/custom-packages